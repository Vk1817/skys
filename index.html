<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live TV</title>

<script src="https://cdn.jsdelivr.net/npm/shaka-player@4.16.2/dist/shaka-player.ui.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/shaka-player@4.16.2/dist/controls.css"/>

<style>
html,body{
  margin:0;
  height:100%;
  background:#000;
  overflow:hidden;
}
#player-container{
  width:100%;
  height:100%;
}
video{
  width:100%;
  height:100%;
  object-fit:contain;
  background:#000;
}
</style>
</head>

<body>

<div id="player-container">
  <video id="video" autoplay muted playsinline preload="metadata"></video>
</div>

<script>
(function(){

  const CONFIG={
    streamUrl:"https://jiotvpllive.cdn.jio.com/bpk-tv/Star_Sports_HD1_Hindi_BTS/output/index.mpd",
    keyId:"400131994b445d8c8817202248760fda",
    key:"2d56cb6f07a75b9aff165d534ae2bfc4",
    cookieUrl:"https://allrounder-live4.pages.dev/api/cookie.json"
  };

  document.addEventListener("DOMContentLoaded",async()=>{

    shaka.polyfill.installAll();
    if(!shaka.Player.isBrowserSupported()) return;

    const video=document.getElementById("video");
    const container=document.getElementById("player-container");

    video.muted=true;

    const player=new shaka.Player();
    await player.attach(video);

    const ui=new shaka.ui.Overlay(player,container,video);

    ui.configure({
      addBigPlayButton:true,
      controlPanelElements:[
        "mute",
        "play_pause",
        "time_and_duration",
        "spacer",
        "quality",
        "picture_in_picture",
        "fullscreen"
      ]
    });

    // 🔥 FULL SPORTLINK CONFIG
    player.configure({
      drm:{clearKeys:{[CONFIG.keyId]:CONFIG.key}},
      manifest:{defaultPresentationDelay:5},
      streaming:{
        lowLatencyMode:true,
        bufferingGoal:10,
        rebufferingGoal:2,
        safeSeekOffset:5
      }
    });

    let cookieValue="";

    try{
      const response=await fetch(CONFIG.cookieUrl,{cache:"no-store"});
      const data=await response.json();
      cookieValue=data.cookie||"";
    }catch(e){}

    // 🔥 IMPORTANT PART (TOKEN + HEADERS INJECTION)
    if(cookieValue){
      player.getNetworkingEngine().registerRequestFilter((type,request)=>{

        request.headers["Referer"]="https://www.jiotv.com/";
        request.headers["User-Agent"]="plaYtv/7.1.5 (Linux;Android 13) ExoPlayerLib/2.11.6";
        request.headers["Cookie"]=cookieValue;

        let urlCookie=cookieValue.startsWith("__hdnea__=")
          ? cookieValue.substring(10)
          : cookieValue;

        if(
          (type===shaka.net.NetworkingEngine.RequestType.MANIFEST ||
           type===shaka.net.NetworkingEngine.RequestType.SEGMENT) &&
          !request.uris[0].includes("__hdnea__")
        ){
          const sep=request.uris[0].includes("?")?"&":"?";
          request.uris[0]+=sep+"__hdnea__="+urlCookie;
        }

      });
    }

    try{
      await player.load(CONFIG.streamUrl);
      video.play().catch(()=>{});
    }catch(e){
      console.log("Stream error:",e);
    }

    // AUTO RESUME
    setInterval(()=>{
      if(video.paused && video.readyState>2){
        video.play().catch(()=>{});
      }
    },3000);

    // AUTO UNMUTE
    document.addEventListener("click",()=>{
      video.muted=false;
    },{once:true});

  });

})();
</script>

</body>
</html>
