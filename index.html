<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sportlink</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/shaka-player@4.16.2/dist/shaka-player.ui.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/shaka-player@4.16.2/dist/controls.css"/>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0f;color:#fff;font-family:'Rajdhani',sans-serif}

/* HEADER */
header{background:#111;border-bottom:2px solid #e8002d;padding:12px 20px;display:flex;justify-content:space-between;align-items:center}
.logo{font-family:'Bebas Neue';font-size:26px;letter-spacing:3px}
.logo span{color:#e8002d}

/* PLAYER */
main{display:flex;justify-content:center;padding:20px}
.player-frame{
width:100%;
max-width:1000px;
aspect-ratio:16/9;
background:#000;
border-radius:10px;
overflow:hidden;
position:relative;
}

video{
width:100%;
height:100%;
object-fit:contain;
}

/* FOOTER */
footer{text-align:center;padding:15px;color:#888;font-size:13px}
</style>
</head>

<body>

<header>
  <div class="logo">Sport<span>link</span></div>
  <div>LIVE 🔴</div>
</header>

<main>
  <div class="player-frame">
    <div id="player-container" style="width:100%;height:100%;">
      <video id="video" autoplay muted playsinline></video>
    </div>
  </div>
</main>

<footer>
  © 2026 Sportlink — All rights reserved
</footer>

<script>
(async function(){

const CONFIG = {
  streamUrl: "https://jiotvpllive.cdn.jio.com/bpk-tv/Star_Sports_HD1_Hindi_BTS/output/index.mpd",
  keyId: "400131994b445d8c8817202248760fda",
  key: "2d56cb6f07a75b9aff165d534ae2bfc4",
  cookieUrl: "https://allrounder-live4.pages.dev/api/cookie.json"
};

shaka.polyfill.installAll();
if (!shaka.Player.isBrowserSupported()) return;

const video = document.getElementById("video");
const container = document.getElementById("player-container");

const player = new shaka.Player();
await player.attach(video);

// UI
const ui = new shaka.ui.Overlay(player, container, video);
ui.configure({
  controlPanelElements:[
    "play_pause",
    "mute",
    "volume",
    "time_and_duration",
    "spacer",
    "quality",
    "fullscreen"
  ]
});

// DRM
player.configure({
  drm:{
    clearKeys:{
      [CONFIG.keyId]: CONFIG.key
    }
  }
});

// COOKIE FETCH
let cookieValue = "";
try{
  const res = await fetch(CONFIG.cookieUrl);
  const data = await res.json();
  cookieValue = data.cookie || "";
}catch(e){}

// APPLY HEADERS
if(cookieValue){
  player.getNetworkingEngine().registerRequestFilter((type,request)=>{
    request.headers["Cookie"] = cookieValue;
    request.headers["Referer"] = "https://www.jiotv.com/";
  });
}

// LOAD STREAM
try{
  await player.load(CONFIG.streamUrl);
  video.play().catch(()=>{});
}catch(e){
  console.log("Stream error", e);
}

// AUTO RESUME
setInterval(()=>{
  if(video.paused && video.readyState>2){
    video.play().catch(()=>{});
  }
},3000);

// AUTO UNMUTE
document.addEventListener("click",()=>{
  video.muted=false;
},{once:true});

})();
</script>

</body>
</html>
